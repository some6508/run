mixed-port: 7890
ipv6: false
mode: rule
log-level: error
allow-lan: true
bind-address: '*'
unified-delay: true
tcp-concurrent: true
external-controller: 0.0.0.0:9090
external-ui-url: https://github.com/Zephyruso/zashboard/releases/latest/download/dist-no-fonts.zip
external-ui: ./ui
secret: ""
geodata-mode: false
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip: https://cdn.jsdelivr.net/gh/DustinWin/ruleset_geodata@mihomo-geodata/geoip-all.dat
  geosite: https://cdn.jsdelivr.net/gh/DustinWin/ruleset_geodata@mihomo-geodata/geosite-all.dat
  mmdb: https://cdn.jsdelivr.net/gh/DustinWin/ruleset_geodata@mihomo-geodata/geoip-all.metadb
  asn: https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/GeoLite2-ASN.mmdb

profile:
  store-selected: false
  store-fake-ip: false

sniffer:
  enable: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
  - +.v2ex.com
  skip-domain:
  - Mijia Cloud

tun:
  enable: true
  stack: mixed
  dns-hijack:
  - any:53
  - tcp://any:53
  auto-route: true
  auto-detect-interface: true

dns_Direct: &dns_Direct [https://doh.pub/dns-query, https://dns.alidns.com/dns-query, https://dot.360.cn/dns-query]

dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  prefer-h3: true
  use-hosts: true
  use-system-hosts: true
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
  - rule-set:fakeip-filter
  default-nameserver:
  - 114.114.114.114
  - 180.184.1.1
  - 119.29.29.29
  - 1.12.12.12
  - 223.5.5.5
  - 8.8.8.8
  - 1.1.1.1
  - system
  nameserver:
  - https://dns.google/dns-query
  - https://cloudflare-dns.com/dns-query
  - https://dns.bebasid.com/dns-query
  - https://dns.csaonline.de/dns-query
  - https://dns.twnic.tw/dns-query
  - https://dns.quad9.net/dns-query
  - https://dot.sb/dns-query
  - https://dns.adguard.com/dns-query
  - https://doh.opendns.com/dns-query
  - https://dns.umbrella.com/dns-query
  proxy-server-nameserver: *dns_Direct
  direct-nameserver: *dns_Direct
  nameserver-policy:
    rule-set:adblockmihomo: rcode://refused

FilterHK: &FilterHK '(?i)(港|hk|hongkong|hong kong|🇭🇰)'
FilterTW: &FilterTW '(?i)(台|新北|彰化|tw|taiwan|🇹🇼)'
FilterJP: &FilterJP '(?i)(日本|川日|东京|大阪|泉日|埼玉|沪日|深日|jp|japan|🇯🇵)'
FilterUS: &FilterUS '(?i)(美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|us|unitedstates|united states|🇺🇸)'
FilterSG: &FilterSG '(?i)(新加坡|坡|狮城|sg|singapore|🇸🇬)'
FilterUN: &FilterUN '(?i)(🇭🇰|🇹🇼|🇯🇵|🇺🇸|🇸🇬|🇨🇳|🇰🇷|港|hk|hongkong|台|新北|彰化|tw|taiwan|日本|川日|东京|大阪|泉日|埼玉|沪日|深日|jp|japan|新加坡|坡|狮城|sg|singapore|美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|us|united states)'

p: &p {url: 'https://connectivitycheck.gstatic.com/generate_204', interval: 600, tolerance: 50, timeout: 2000, max-failed-times: 3, expected-status: 204, lazy: true, include-all: true}
pg_Proxy: &pg_Proxy {type: select, proxies: [
  🚀 节点选择, ♻️ 自动选择, ☁️ 故障转移, 🔮 负载均衡, 🖲️ 手动选择,
  🇭🇰 香港节点-♻️ 自动选择, 🇹🇼 台湾节点-♻️ 自动选择, 🇯🇵 日本节点-♻️ 自动选择, 🇺🇸 美国节点-♻️ 自动选择, 🇸🇬 新加坡节点-♻️ 自动选择, 🇺🇳 其它节点-♻️ 自动选择,
  🎯 直连访问, 🚫 拦截访问
]}

Select: &Select {type: select, include-all: true, proxies: [DIRECT]}
UrlTest: &UrlTest {type: url-test, <<: *p}
FallBack: &FallBack {type: fallback, <<: *p}
LoadBalance: &LoadBalance {type: load-balance, strategy: consistent-hashing, <<: *p}

proxy-groups:
  - name: 🚀 节点选择
    type: select
    icon: https://cdn.jsdelivr.net/gh/GitMetaio/Surfing@rm/Home/icon/All.svg
    proxies: [
      ♻️ 自动选择, ☁️ 故障转移, 🔮 负载均衡, 🖲️ 手动选择,
      🇭🇰 香港节点-♻️ 自动选择, 🇹🇼 台湾节点-♻️ 自动选择, 🇯🇵 日本节点-♻️ 自动选择, 🇺🇸 美国节点-♻️ 自动选择, 🇸🇬 新加坡节点-♻️ 自动选择, 🇺🇳 其它节点-♻️ 自动选择,
      🎯 直连访问
    ]

  - name: ♻️ 自动选择
    icon: https://cdn.jsdelivr.net/gh/fmz200/wool_scripts@main/icons/apps/UrlTest.png
    <<: *UrlTest

  - name: ☁️ 故障转移
    icon: https://cdn.jsdelivr.net/gh/fmz200/wool_scripts@main/icons/apps/FallBack.png
    <<: *FallBack

  - name: 🖲️ 手动选择
    icon: https://cdn.jsdelivr.net/gh/fmz200/wool_scripts@main/icons/apps/select.png
    <<: *Select

  - name: 🔮 负载均衡
    icon: https://cdn.jsdelivr.net/gh/clash-verge-rev/clash-verge-rev.github.io@main/docs/assets/icons/adjust.svg
    <<: *LoadBalance

  - name: 🍀 Google
    icon: https://cdn.jsdelivr.net/gh/GitMetaio/Surfing@rm/Home/icon/Google.svg
    <<: *pg_Proxy

  - name: 🪩 Cloudflare
    icon: https://cdn.jsdelivr.net/gh/clash-verge-rev/clash-verge-rev.github.io@main/docs/assets/icons/cloudflare.svg
    <<: *pg_Proxy
    
  - name: 🪟 Microsoft
    icon: https://cdn.jsdelivr.net/gh/GitMetaio/Surfing@rm/Home/icon/Microsoft.svg
    <<: *pg_Proxy

  - name: ✈️ Telegram
    icon: https://cdn.jsdelivr.net/gh/GitMetaio/Surfing@rm/Home/icon/Telegram.svg
    <<: *pg_Proxy

  - name: 🎵 TikTok
    icon: https://cdn.jsdelivr.net/gh/GitMetaio/Surfing@rm/Home/icon/TikTok.svg
    <<: *pg_Proxy

  - name: 🇭🇰 香港节点-♻️ 自动选择
    icon: https://cdn.jsdelivr.net/gh/GitMetaio/Surfing@rm/Home/icon/HK.svg
    filter: *FilterHK
    <<: *UrlTest

  - name: 🇹🇼 台湾节点-♻️ 自动选择
    icon: https://cdn.jsdelivr.net/gh/GitMetaio/Surfing@rm/Home/icon/CN.svg
    filter: *FilterTW
    <<: *UrlTest

  - name: 🇯🇵 日本节点-♻️ 自动选择
    icon: https://cdn.jsdelivr.net/gh/GitMetaio/Surfing@rm/Home/icon/JP.svg
    filter: *FilterJP
    <<: *UrlTest

  - name: 🇺🇸 美国节点-♻️ 自动选择
    icon: https://cdn.jsdelivr.net/gh/GitMetaio/Surfing@rm/Home/icon/US.svg
    filter: *FilterUS
    <<: *UrlTest

  - name: 🇸🇬 新加坡节点-♻️ 自动选择
    icon: https://cdn.jsdelivr.net/gh/GitMetaio/Surfing@rm/Home/icon/Singapore.svg
    filter: *FilterSG
    <<: *UrlTest

  - name: 🇺🇳 其它节点-♻️ 自动选择
    icon: https://cdn.jsdelivr.net/gh/clash-verge-rev/clash-verge-rev.github.io@main/docs/assets/icons/flags/un.svg
    exclude-filter: *FilterUN
    <<: *UrlTest

  - name: 🎯 直连访问
    type: url-test
    icon: https://cdn.jsdelivr.net/gh/clash-verge-rev/clash-verge-rev.github.io@main/docs/assets/icons/link.svg
    url: https://connectivitycheck.platform.hicloud.com/generate_204
    interval: 600
    proxies:
    - DIRECT
    - REJECT

  - name: 🚫 拦截访问
    type: select
    icon: https://cdn.jsdelivr.net/gh/clash-verge-rev/clash-verge-rev.github.io@main/docs/assets/icons/block.svg
    proxies:
    - REJECT
    - DIRECT
    - 🚀 节点选择

  - name: 🐟 漏网之鱼
    type: select
    icon: https://cdn.jsdelivr.net/gh/clash-verge-rev/clash-verge-rev.github.io@main/docs/assets/icons/fish.svg
    proxies:
    - 🚀 节点选择
    - DIRECT
    - REJECT

RuleSet_ipcidr_mrs: &RuleSet_ipcidr_mrs {type: http, interval: 86400, behavior: ipcidr, format: mrs}
RuleSet_domain_mrs: &RuleSet_domain_mrs {type: http, interval: 86400, behavior: domain, format: mrs}
RuleSet_classical_yaml: &RuleSet_classical_yaml {type: http, interval: 86400, behavior: classical, format: yaml}

rule-providers:
  privateip:
    <<: *RuleSet_ipcidr_mrs
    path: ./ruleset/privateip.mrs
    url: https://cdn.jsdelivr.net/gh/DustinWin/ruleset_geodata@mihomo-ruleset/privateip.mrs

  telegramip:
    <<: *RuleSet_ipcidr_mrs
    path: ./ruleset/telegramip.mrs
    url: https://cdn.jsdelivr.net/gh/DustinWin/ruleset_geodata@mihomo-ruleset/telegramip.mrs

  cnip:
    <<: *RuleSet_ipcidr_mrs
    path: ./ruleset/cnip.mrs
    url: https://cdn.jsdelivr.net/gh/DustinWin/ruleset_geodata@mihomo-ruleset/cnip.mrs

  fakeip-filter:
    <<: *RuleSet_domain_mrs
    path: ./ruleset/fakeip-filter.mrs
    url: https://cdn.jsdelivr.net/gh/DustinWin/ruleset_geodata@mihomo-ruleset/fakeip-filter.mrs

  private:
    <<: *RuleSet_domain_mrs
    path: ./ruleset/private.mrs
    url: https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/private.mrs

  telegram:
    <<: *RuleSet_domain_mrs
    path: ./ruleset/telegram.mrs
    url: https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/telegram.mrs

  microsoft:
    <<: *RuleSet_domain_mrs
    path: ./ruleset/microsoft.mrs
    url: https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/microsoft.mrs

  cloudflare:
    <<: *RuleSet_domain_mrs
    path: ./ruleset/cloudflare.mrs
    url: https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/cloudflare.mrs

  gfw:
    <<: *RuleSet_domain_mrs
    path: ./ruleset/gfw.mrs
    url: https://cdn.jsdelivr.net/gh/DustinWin/ruleset_geodata@mihomo-ruleset/gfw.mrs

  tiktok:
    <<: *RuleSet_domain_mrs
    path: ./ruleset/tiktok.mrs
    url: https://cdn.jsdelivr.net/gh/DustinWin/ruleset_geodata@mihomo-ruleset/tiktok.mrs

  proxy:
    <<: *RuleSet_domain_mrs
    path: ./ruleset/proxy.mrs
    url: https://cdn.jsdelivr.net/gh/DustinWin/ruleset_geodata@mihomo-ruleset/proxy.mrs

  cn:
    <<: *RuleSet_domain_mrs
    path: ./ruleset/cn.mrs
    url: https://cdn.jsdelivr.net/gh/DustinWin/ruleset_geodata@mihomo-ruleset/cn.mrs

  games-cn:
    <<: *RuleSet_domain_mrs
    path: ./ruleset/games-cn.mrs
    url: https://cdn.jsdelivr.net/gh/DustinWin/ruleset_geodata@mihomo-ruleset/games-cn.mrs

  apple-cn:
    <<: *RuleSet_domain_mrs
    path: ./ruleset/apple-cn.mrs
    url: https://cdn.jsdelivr.net/gh/DustinWin/ruleset_geodata@mihomo-ruleset/apple-cn.mrs

  networktest:
    <<: *RuleSet_domain_mrs
    path: ./ruleset/networktest.mrs
    url: https://cdn.jsdelivr.net/gh/DustinWin/ruleset_geodata@mihomo-ruleset/networktest.mrs

  adblockmihomo:
    <<: *RuleSet_domain_mrs
    path: ./ruleset/adblockmihomo.mrs
    url: https://cdn.jsdelivr.net/gh/217heidai/adblockfilters@main/rules/adblockmihomo.mrs

rules:
  - RULE-SET,privateip,DIRECT,no-resolve
  - RULE-SET,private,DIRECT
  - AND,((NETWORK,UDP),(DST-PORT,443)),🚫 拦截访问
  - RULE-SET,adblockmihomo,🚫 拦截访问
  - RULE-SET,networktest,🎯 直连访问
  - RULE-SET,games-cn,🎯 直连访问
  - RULE-SET,apple-cn,🎯 直连访问
  - RULE-SET,telegram,✈️ Telegram
  - RULE-SET,telegramip,✈️ Telegram,no-resolve
  - RULE-SET,tiktok,🎵 TikTok
  - RULE-SET,cloudflare,🪩 Cloudflare
  - RULE-SET,microsoft,🪟 Microsoft
  - RULE-SET,gfw,🍀 Google
  - RULE-SET,proxy,🍀 Google
  - RULE-SET,cn,🎯 直连访问
  - RULE-SET,cnip,🎯 直连访问,no-resolve
  - MATCH,🐟 漏网之鱼
  - NETWORK,udp,🚫 拦截访问
